          $settingsUri = "https://$scmHost/api/settings"
          $settingsBody = @{
            WEBSITE_RUN_FROM_PACKAGE                  = "1"
            APPSETTING_WEBSITE_RUN_FROM_PACKAGE       = "1"
            WEBSITES_ENABLE_APP_SERVICE_STORAGE       = "true"
            APPSETTING_WEBSITES_ENABLE_APP_SERVICE_STORAGE = "true"
            SCM_DO_BUILD_DURING_DEPLOYMENT            = "false"
            ENABLE_ORYX_BUILD                         = "false"
          } | ConvertTo-Json
            Invoke-KuduJson -Method POST -Uri $settingsUri -Headers $hdrs -Body $settingsBody | Out-Null
          Write-Host "Kudu settings updated."

          # 1b) Verify what Kudu thinks the settings are (and give it a moment to settle)
          $verifyUri = "https://$scmHost/api/settings"
          for ($i = 1; $i -le 6; $i++) {
              $s = Invoke-KuduJson -Method GET -Uri $verifyUri -Headers $hdrs
            $w = $s.WEBSITE_RUN_FROM_PACKAGE
            $a = $s.APPSETTING_WEBSITE_RUN_FROM_PACKAGE

            Write-Host ("Kudu settings check #{0}: WEBSITE_RUN_FROM_PACKAGE={1} APPSETTING_WEBSITE_RUN_FROM_PACKAGE={2}" -f $i, $w, $a)

            if ($w -eq "1" -or $a -eq "1") { break }
            Start-Sleep -Seconds 2
          }

          if (-not (($s.WEBSITE_RUN_FROM_PACKAGE -eq "1") -or ($s.APPSETTING_WEBSITE_RUN_FROM_PACKAGE -eq "1"))) {
            throw "Kudu still does not report run-from-package as enabled (expected '1'). Aborting before ZipDeploy."
          }
          # 2) Deploy via ARM (config-zip)
          $rg = "rg-hope-ai-api-staging"
          $app = "hope-ai-api-staging"

          Write-Host "Deploying deploy.zip via az functionapp deployment source config-zip..."
          Write-Host "RG=$rg APP=$app ZIP=$zipPath"

          az functionapp deployment source config-zip `
            --resource-group $rg `
            --name $app `
            --src $zipPath

          Write-Host "config-zip command completed."

          # Quick health check (staging) - retry (cold start + package mount can take time)
          # Optional: restart to force host reload after config-zip
          # 2b) Wait for Kudu to report the latest deployment is complete (best-effort)
          # This reduces false 500s during package staging/mount.
          $latestUri = "https://$scmHost/api/deployments/latest"
          $deployDeadline = (Get-Date).AddMinutes(6)
          for ($i = 1; $i -le 72; $i++) {
            Start-Sleep -Seconds 5
            $resp = Invoke-WebRequest -Method GET -Uri $latestUri -Headers $hdrs -SkipHttpErrorCheck
            if ($resp.StatusCode -ne 200) {
              Write-Host "Kudu deploy poll #${i}: HTTP $($resp.StatusCode)"
              continue
            }

            try {
              $j = $resp.Content | ConvertFrom-Json
              Write-Host ("Kudu deploy poll #{0}: status={1} complete={2} end_time={3} message={4}" -f $i, $j.status, $j.complete, $j.end_time, $j.message)
              if ($j.complete -eq $true) { break }
            } catch {
              Write-Host "Kudu deploy poll #${i}: non-JSON payload"
            }

            if ((Get-Date) -ge $deployDeadline) { break }
          }

          $health = "https://hope-ai-api-staging.azurewebsites.net/api/version"
          $ok = $false
          for ($i = 1; $i -le 24; $i++) {
            Start-Sleep -Seconds 5
            $h = Invoke-WebRequest -Method GET -Uri $health -SkipHttpErrorCheck
            Write-Host "Health try #${i}: $($h.StatusCode) $health"
            if ($h.StatusCode -eq 200) { $ok = $true; break }
            if ($h.Content) { Write-Host $h.Content }
          }
          if (-not $ok) {
            throw "Post-deploy health check failed after retries."
