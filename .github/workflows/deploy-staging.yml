name: Deploy hope-ai-api-staging to Azure Functions

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript -> dist)
        run: npm run build

      - name: Copy function.json to root (required for discovery)
        run: npm run copy

      - name: Verify Functions layout
        run: npm run verify:layout

      - name: Stage minimal deploy package (.deploy)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $repoRoot  = (Get-Location).Path
          $deployDir = Join-Path $repoRoot ".deploy"

          if (Test-Path $deployDir) { Remove-Item -Recurse -Force $deployDir }
          New-Item -ItemType Directory -Force $deployDir | Out-Null

          # Required
          if (-not (Test-Path (Join-Path $repoRoot "host.json"))) { throw "host.json missing at repo root." }
          Copy-Item -Force (Join-Path $repoRoot "host.json") (Join-Path $deployDir "host.json")

          # Optional (some tooling expects these at root)
          if (Test-Path (Join-Path $repoRoot "package.json")) { Copy-Item -Force (Join-Path $repoRoot "package.json") (Join-Path $deployDir "package.json") }
          if (Test-Path (Join-Path $repoRoot "package-lock.json")) { Copy-Item -Force (Join-Path $repoRoot "package-lock.json") (Join-Path $deployDir "package-lock.json") }

          # Install production deps into staged folder (no Oryx build on Azure)
          Push-Location $deployDir
          npm ci --omit=dev
          Pop-Location

          # Compiled JS
          $distSrc = Join-Path $repoRoot "dist"
          if (-not (Test-Path $distSrc)) { throw "dist/ missing. Did npm run build run?" }
          Copy-Item -Recurse -Force $distSrc (Join-Path $deployDir "dist")

          # Function folders at repo root (created by npm run copy)
          $exclude = @("src","dist","node_modules",".git",".github",".deploy","docs","scripts")
          Get-ChildItem -Path $repoRoot -Directory |
            Where-Object { $_.Name -notin $exclude } |
            Where-Object { Test-Path (Join-Path $_.FullName "function.json") } |
            ForEach-Object {
              Copy-Item -Recurse -Force $_.FullName (Join-Path $deployDir $_.Name)
            }

          Write-Host "Staged deploy folder: $deployDir"
          Write-Host ("Staged size (MB): {0:N2}" -f ((Get-ChildItem -Recurse $deployDir -File | Measure-Object -Sum Length).Sum / 1MB))

      - name: Create deploy.zip (zip contents of .deploy, not the folder)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path ".deploy")) { throw ".deploy folder missing." }

          $zipPath = Join-Path (Get-Location).Path "deploy.zip"
          if (Test-Path $zipPath) { Remove-Item -Force $zipPath }

          Compress-Archive -Path ".deploy/*" -DestinationPath $zipPath -Force
          Write-Host "Created $zipPath"
          Get-Item $zipPath | Format-List Name,Length,FullName
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy via ARM config-zip (PowerShell)
        shell: pwsh
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_STAGING }}
        run: |
          $ErrorActionPreference = "Stop"

          if (-not $env:PUBLISH_PROFILE) { throw "PUBLISH_PROFILE secret is empty." }

          # Parse publish profile XML (supports MSDeploy, ZipDeploy, etc.)
          $xml = [xml]$env:PUBLISH_PROFILE
          $profiles = @($xml.publishData.publishProfile)
          if (-not $profiles -or $profiles.Count -eq 0) { throw "No publishProfile entries found in secret." }

          # Pick best available:
          #  1) publishUrl contains '.scm.'
          #  2) publishMethod ZipDeploy/MSDeploy
          #  3) otherwise first with username/password
          $p = ($profiles | Where-Object { $_.publishUrl -match "\.scm\." } | Select-Object -First 1)
          if (-not $p) { $p = ($profiles | Where-Object { $_.publishMethod -match "ZipDeploy|MSDeploy" } | Select-Object -First 1) }
          if (-not $p) { $p = ($profiles | Where-Object { $_.userName -and $_.userPWD } | Select-Object -First 1) }
          if (-not $p) { throw "Could not find a usable publishProfile (no userName/userPWD)." }

          $scmHost = [string]$p.publishUrl
          $user    = [string]$p.userName
          $pass    = [string]$p.userPWD

          if (-not $scmHost -or -not $user -or -not $pass) {
            throw "publishUrl/userName/userPWD missing in selected publishProfile."
          }

          $zipPath = Join-Path (Get-Location).Path "deploy.zip"
          if (-not (Test-Path $zipPath)) { throw "deploy.zip missing." }

          $pair = "{0}:{1}" -f $user, $pass
          $b64  = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
          $hdrs = @{ Authorization = "Basic $b64" }

          # 1) Force run-from-package and disable build flags (important for zipdeploy stability)
            function Invoke-KuduJson {
              param(
                [Parameter(Mandatory=$true)][ValidateSet("GET","POST","PUT","DELETE")][string] $Method,
                [Parameter(Mandatory=$true)][string] $Uri,
                [Parameter(Mandatory=$true)][hashtable] $Headers,
                [Parameter(Mandatory=$false)][string] $Body = $null,
                [int] $MaxAttempts = 8,
                [int] $InitialDelaySeconds = 2
              )

              $attempt = 0
              $delay = $InitialDelaySeconds
              while ($true) {
                $attempt++
                try {
                  $opts = @{
                    Method = $Method
                    Uri = $Uri
                    Headers = $Headers
                    SkipHttpErrorCheck = $true
                  }
                  if ($null -ne $Body) {
                    $opts["ContentType"] = "application/json"
                    $opts["Body"] = $Body
                  }

                  $resp = Invoke-WebRequest @opts

                  # Treat 502/503/504 as transient (Kudu/SCM flakiness)
                  if ($resp.StatusCode -in 502,503,504) {
                    throw "Transient HTTP $($resp.StatusCode)"
                  }

                  if ($resp.StatusCode -ge 400) {
                    $txt = [string]$resp.Content
                    throw "HTTP $($resp.StatusCode) calling $Uri`n$txt"
                  }

                  if ($resp.Content) { return ($resp.Content | ConvertFrom-Json) }
                  return $null
                }
                catch {
                  $msg = name: Deploy hope-ai-api-staging to Azure Functions

