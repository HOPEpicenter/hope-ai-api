name: Deploy hope-ai-api-staging to Azure Functions
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript -> dist)
        run: npm run build

      - name: Copy function.json to root (required for discovery)
        run: npm run copy

      - name: Verify Functions layout
        run: npm run verify:layout

      - name: Stage minimal deploy package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $repoRoot  = (Get-Location).Path
          $deployDir = Join-Path $repoRoot ".deploy"

          if (Test-Path $deployDir) { Remove-Item -Recurse -Force $deployDir }
          New-Item -ItemType Directory -Force $deployDir | Out-Null

          # host.json is required
          if (-not (Test-Path (Join-Path $repoRoot "host.json"))) { throw "host.json missing at repo root." }
          Copy-Item -Force (Join-Path $repoRoot "host.json") (Join-Path $deployDir "host.json")

          # compiled JS is required
          $distSrc = Join-Path $repoRoot "dist"
          if (-not (Test-Path $distSrc)) { throw "dist/ missing. Did npm run build run?" }
          Copy-Item -Recurse -Force $distSrc (Join-Path $deployDir "dist")

          # function folders at repo root (created by npm run copy)
          $exclude = @("src","dist","node_modules",".git",".github",".deploy","docs","scripts")
          Get-ChildItem -Path $repoRoot -Directory |
            Where-Object { $_.Name -notin $exclude } |
            Where-Object { Test-Path (Join-Path $_.FullName "function.json") } |
            ForEach-Object {
              Copy-Item -Recurse -Force $_.FullName (Join-Path $deployDir $_.Name)
            }

          Write-Host "Staged deploy folder: $deployDir"
          Write-Host ("Staged size (MB): {0:N2}" -f ((Get-ChildItem -Recurse $deployDir -File | Measure-Object -Sum Length).Sum / 1MB))

      # IMPORTANT:
      # If WEBSITE_RUN_FROM_PACKAGE is a SAS URL (typical after `func azure functionapp publish`),
      # Kudu ZipDeploy can fail. Force it back to "1" using Kudu + publish-profile creds.
      - name: Force WEBSITE_RUN_FROM_PACKAGE=1 (Kudu)
        shell: pwsh
        env:
          APP_NAME: hope-ai-api-staging
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_STAGING }}
        run: |
          $ErrorActionPreference = "Stop"

          if (-not $env:PUBLISH_PROFILE) { throw "PUBLISH_PROFILE secret is empty." }

          $xml = [xml]$env:PUBLISH_PROFILE
          $profiles = @($xml.publishData.publishProfile)

          if (-not $profiles -or $profiles.Count -eq 0) {
            throw "No publishProfile entries found in secret."
          }

          # Pick the best available profile:
          #  1) One whose publishUrl contains '.scm.'
          #  2) Otherwise one with publishMethod ZipDeploy/MSDeploy
          #  3) Otherwise first with username/password
          $p =
            ($profiles | Where-Object { $_.publishUrl -match "\.scm\." } | Select-Object -First 1)

          if (-not $p) {
            $p = ($profiles | Where-Object { $_.publishMethod -match "ZipDeploy|MSDeploy" } | Select-Object -First 1)
          }

          if (-not $p) {
            $p = ($profiles | Where-Object { $_.userName -and $_.userPWD } | Select-Object -First 1)
          }

          if (-not $p) { throw "Could not find a usable publishProfile (no userName/userPWD)." }

          $user = [string]$p.userName
          $pass = [string]$p.userPWD

          if (-not $user -or -not $pass) { throw "Publish profile missing userName/userPWD." }

          # Determine SCM host
          $scmHost = [string]$p.publishUrl
          if (-not $scmHost) { $scmHost = "$($env:APP_NAME).scm.azurewebsites.net" }

          # publishUrl may include :443; that's fine
          if ($scmHost -notmatch "\.scm\.") { $scmHost = "$($env:APP_NAME).scm.azurewebsites.net" }

          $scm = "https://$scmHost/api/settings"

          $pair = "{0}:{1}" -f $user, $pass
          $b64  = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
          $hdrs = @{ Authorization = "Basic $b64" }

          Write-Host "Using SCM: $scm"
          Invoke-RestMethod -Method POST -Uri $scm -Headers $hdrs `
            -Body (@{ WEBSITE_RUN_FROM_PACKAGE = "1" } | ConvertTo-Json) `
            -ContentType "application/json" | Out-Null

          Write-Host "Set WEBSITE_RUN_FROM_PACKAGE=1 via Kudu."

      - name: Deploy to Azure Functions (ZipDeploy)
        uses: Azure/functions-action@v1.5.1
        with:
          app-name: hope-ai-api-staging
          package: ./.deploy
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_STAGING }}
          respect-funcignore: true