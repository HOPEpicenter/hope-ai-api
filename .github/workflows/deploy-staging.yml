name: Deploy hope-ai-api-staging to Azure Functions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Azure Functions Core Tools
        shell: pwsh
        run: |
          npm install -g azure-functions-core-tools@4 --unsafe-perm true
          func --version

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript -> dist)
        run: npm run build

      - name: Copy function.json to root (required for discovery)
        run: npm run copy

      - name: Verify Functions layout
        run: npm run verify:layout


      - name: Validate Azure OIDC inputs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace("${{ secrets.AZURE_CLIENT_ID }}")) {
            throw "AZURE_CLIENT_ID is missing or empty."
          }

          if ([string]::IsNullOrWhiteSpace("${{ secrets.AZURE_TENANT_ID }}")) {
            throw "AZURE_TENANT_ID is missing or empty."
          }

          if ([string]::IsNullOrWhiteSpace("${{ secrets.AZURE_SUBSCRIPTION_ID }}")) {
            throw "AZURE_SUBSCRIPTION_ID is missing or empty."
          }

          Write-Host "Azure OIDC secret presence check passed."
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy via ARM config-zip (PowerShell)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $rg = "rg-hope-ai-api-staging"
          $app = "hope-ai-api-staging"

          # Configure app settings via Azure CLI / ARM (avoid flaky Kudu /api/settings)
          az functionapp config appsettings set `
            --resource-group $rg `
            --name $app `
            --settings `
              WEBSITE_RUN_FROM_PACKAGE=1 `
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=true `
              SCM_DO_BUILD_DURING_DEPLOYMENT=false `
              ENABLE_ORYX_BUILD=false | Out-Null

          Write-Host "App settings updated via Azure CLI."

          # Deploy with the same path used by repair-staging.ps1
          Write-Host "Deploying via Azure Functions Core Tools publish..."
          Write-Host "APP=$app"

          func azure functionapp publish $app --no-build --javascript

          if ($LASTEXITCODE -ne 0) {
            throw "func publish deployment failed."
          }

          Write-Host "func publish command completed."

          # Post-deploy health check (cold-start safe)
          $health = "https://hope-ai-api-staging.azurewebsites.net/api/version"
          $ok = $false
          for ($i = 1; $i -le 24; $i++) {
            Start-Sleep -Seconds 5
            $h = Invoke-WebRequest -Method GET -Uri $health -SkipHttpErrorCheck
            Write-Host "Health try #${i}: $($h.StatusCode) $health"
            if ($h.StatusCode -eq 200) { $ok = $true; break }
            if ($h.Content) { Write-Host $h.Content }
          }

          if (-not $ok) {
            throw "Post-deploy health check failed after retries."
          }

